<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HerSafe Network – Safety for Solo Women Travelers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .sos-btn { animation: pulse 1.5s infinite; transition: transform 0.2s; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .map-placeholder { background: #f1f5f9; height: 180px; border-radius: 2rem; display: flex; align-items: center; justify-content: center; color: #94a3b8; border: 2px dashed #e2e8f0; margin-bottom: 2rem; }
    </style>
</head>
<body class="bg-white">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-router-dom@6.22.3/dist/umd/react-router-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js" crossorigin></script>

    <script type="text/babel" data-presets="env,react">
        // FAIL-SAFE: Check both potential names for the Router library
        const RouterLib = window.ReactRouterDOM || window.ReactRouter;
        const { HashRouter, Routes, Route, Link, Navigate, useNavigate, useParams, useLocation } = RouterLib;
        const { useState, useEffect, useRef, createContext, useContext } = React;

        // --- Data Persistence ---
        const Storage = {
            get: (key) => JSON.parse(localStorage.getItem(key)) || [],
            set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
            currentUser: (user) => user ? localStorage.setItem('hs_session', JSON.stringify(user)) : JSON.parse(localStorage.getItem('hs_session'))
        };

        // --- Mock Data Setup ---
        if (!localStorage.getItem('hs_users')) {
            Storage.set('hs_users', [
                { id: 'g1', phone: '1', name: 'Priya Sharma', city: 'Jaipur', role: 'guardian', badge: 'Trusted', rating: 4.8, helps: 12, available: true },
                { id: 'g2', phone: '2', name: 'Anjali Mehta', city: 'Jaipur', role: 'guardian', badge: 'Verified', rating: 4.2, helps: 5, available: true }
            ]);
        }

        const AuthContext = createContext();
        function AuthProvider({ children }) {
            const [user, setUser] = useState(Storage.currentUser());
            const login = (phone) => {
                const users = Storage.get('hs_users');
                let u = users.find(x => x.phone === phone) || { id: 'u'+Date.now(), phone, name: '', city: 'Jaipur', role: 'traveler' };
                if (!users.find(x => x.phone === phone)) { users.push(u); Storage.set('hs_users', users); }
                Storage.currentUser(u); setUser(u);
                return u;
            };
            const logout = () => { localStorage.removeItem('hs_session'); setUser(null); };
            const updateProfile = (data) => {
                const users = Storage.get('hs_users');
                const idx = users.findIndex(x => x.id === user.id);
                const updated = { ...user, ...data };
                users[idx] = updated; Storage.set('hs_users', users); Storage.currentUser(updated); setUser(updated);
            };
            return <AuthContext.Provider value={{ user, login, logout, updateProfile }}>{children}</AuthContext.Provider>;
        }
        const useAuth = () => useContext(AuthContext);

        // --- UI Screens ---
        function Login() {
            const [phone, setPhone] = useState('');
            const { login } = useAuth();
            const nav = useNavigate();
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center">
                    <div className="w-20 h-20 bg-purple-600 rounded-[2rem] mb-8 flex items-center justify-center text-white text-4xl shadow-xl shadow-purple-200">
                        <i className="fas fa-shield-heart"></i>
                    </div>
                    <h1 className="text-4xl font-black text-gray-900 mb-4">HerSafe</h1>
                    <p className="text-gray-500 mb-10 max-w-xs leading-relaxed">Safety network for women. Connect with trusted local guardians.</p>
                    <input type="tel" placeholder="Mobile Number" value={phone} onChange={e=>setPhone(e.target.value)} className="w-full max-w-sm p-5 bg-gray-50 border border-gray-100 rounded-3xl mb-4 focus:ring-2 focus:ring-purple-500 outline-none transition-all" />
                    <button onClick={() => { login(phone); nav('/'); }} className="w-full max-w-sm bg-purple-600 text-white p-5 rounded-3xl font-bold text-lg shadow-xl hover:bg-purple-700 transition-all">Get Started</button>
                    <p className="text-xs text-gray-400 mt-10 uppercase tracking-widest font-bold">Try '1' for Guardian Demo</p>
                </div>
            );
        }

        function Setup() {
            const { user, updateProfile } = useAuth();
            const [f, setF] = useState({ name: '', city: user.city || 'Jaipur', role: 'traveler' });
            const nav = useNavigate();
            return (
                <div className="min-h-screen p-10 flex flex-col justify-center max-w-sm mx-auto">
                    <h2 className="text-3xl font-black text-gray-900 mb-8">Setup Profile</h2>
                    <input placeholder="Your Name" className="w-full p-4 border rounded-2xl mb-4 bg-gray-50" onChange={e=>setF({...f, name: e.target.value})} />
                    <select className="w-full p-4 border rounded-2xl mb-10 bg-gray-50 appearance-none font-bold" onChange={e=>setF({...f, role: e.target.value})}>
                        <option value="traveler">I am a Traveler</option>
                        <option value="guardian">I am a Guardian</option>
                    </select>
                    <button onClick={() => { updateProfile(f); nav('/'); }} className="w-full bg-purple-600 text-white p-5 rounded-3xl font-black shadow-lg">Enter Dashboard</button>
                </div>
            );
        }

        function Traveler() {
            const { user, logout } = useAuth();
            const guardians = Storage.get('hs_users').filter(u => u.role === 'guardian' && u.city === user.city);
            return (
                <div className="max-w-md mx-auto min-h-screen pb-20 p-6">
                    <header className="flex justify-between items-center mb-10">
                        <span className="text-2xl font-black text-purple-700">HerSafe</span>
                        <button onClick={logout} className="w-12 h-12 bg-gray-50 rounded-2xl text-gray-400 flex items-center justify-center">
                            <i className="fas fa-power-off"></i>
                        </button>
                    </header>
                    <div className="bg-purple-700 p-8 rounded-[3rem] text-white mb-10 shadow-2xl relative overflow-hidden">
                        <h2 className="text-3xl font-bold mb-1">Hi, {user.name}</h2>
                        <p className="text-purple-100 opacity-80">You're in Jaipur</p>
                    </div>
                    <h3 className="font-black text-xl mb-6">Local Guardians</h3>
                    <div className="space-y-4">
                        {guardians.map(g => (
                            <div key={g.id} className="flex items-center justify-between p-5 border border-gray-100 rounded-[2.5rem] bg-white shadow-sm">
                                <div className="flex items-center gap-4">
                                    <div className="w-14 h-14 bg-purple-50 rounded-2xl flex items-center justify-center text-purple-700 font-black text-xl">{g.name[0]}</div>
                                    <div>
                                        <p className="font-black text-gray-900 leading-none mb-1">{g.name}</p>
                                        <p className="text-xs font-bold text-purple-500 uppercase tracking-tighter">{g.badge} • ⭐ {g.rating}</p>
                                    </div>
                                </div>
                                <Link to={`/chat/${g.id}?name=${g.name}`} className="bg-gray-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center">
                                    <i className="fas fa-comment"></i>
                                </Link>
                            </div>
                        ))}
                    </div>
                    <button className="sos-btn fixed bottom-8 right-8 bg-red-600 text-white w-24 h-24 rounded-full font-black shadow-2xl z-50 text-xl border-8 border-white">SOS</button>
                </div>
            );
        }

        function Guardian() {
            const { user, logout, updateProfile } = useAuth();
            return (
                <div className="max-w-md mx-auto min-h-screen p-8 text-center flex flex-col justify-center">
                    <div className="text-8xl mb-6 text-emerald-500"><i className="fas fa-shield-check"></i></div>
                    <h1 className="text-3xl font-black text-gray-900 mb-2">Guardian Active</h1>
                    <p className="text-gray-500 mb-10">You are helping keep {user.city} safe. We'll alert you if someone needs help.</p>
                    <button onClick={logout} className="bg-gray-100 p-5 rounded-3xl font-bold w-full text-gray-600">Logout</button>
                </div>
            );
        }

        function Chat() {
            const { chatId } = useParams();
            const name = new URLSearchParams(useLocation().search).get('name') || 'Help';
            return (
                <div className="max-w-md mx-auto h-screen flex flex-col">
                    <div className="p-6 bg-purple-700 text-white flex items-center gap-4 shadow-xl">
                        <Link to="/"><i className="fas fa-arrow-left"></i></Link>
                        <span className="font-black text-xl">Chat with {name}</span>
                    </div>
                    <div className="flex-1 p-6 bg-gray-50">
                        <div className="bg-white p-5 rounded-3xl rounded-tl-none shadow-sm max-w-[85%] font-bold text-gray-800 border border-gray-100">
                            Hi {name}! I'm solo traveling nearby. Can you guide me?
                        </div>
                    </div>
                    <div className="p-4 border-t flex gap-3 bg-white">
                        <input className="flex-1 bg-gray-50 rounded-2xl px-6 py-4 outline-none border border-transparent focus:border-purple-500" placeholder="Type..." />
                        <button className="bg-purple-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg"><i className="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            );
        }

        function App() {
            const { user } = useAuth();
            if (!user) return <Login />;
            if (!user.name) return <Setup />;
            return (
                <Routes>
                    <Route path="/" element={user.role === 'traveler' ? <Traveler /> : <Guardian />} />
                    <Route path="/chat/:id" element={<Chat />} />
                    <Route path="*" element={<Navigate to="/" />} />
                </Routes>
            );
        }

        // START APP
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <HashRouter>
                <AuthProvider>
                    <App />
                </AuthProvider>
            </HashRouter>
        );
    </script>
</body>
</html>
