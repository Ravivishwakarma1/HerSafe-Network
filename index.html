<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HerSafe Network – Safety for Solo Women Travelers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .sos-btn { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .chat-container { max-height: 400px; overflow-y: auto; }
        .map-placeholder { background: #e9eef3; display: flex; align-items: center; justify-content: center; height: 280px; border-radius: 1rem; color: #4b5563; }
        .star-rating i { cursor: pointer; transition: 0.1s; }
    </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-router-dom@6.22.3/dist/umd/react-router-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js" crossorigin></script>

<script type="text/babel" data-presets="react,stage-2">
    const { HashRouter, Routes, Route, Link, Navigate, useNavigate, useParams, useLocation } = ReactRouterDOM;
    const { useState, useEffect, useRef, createContext, useContext } = React;

    // ---------- Storage Logic ----------
    const STORAGE_KEYS = {
        USERS: 'hersafe_users',
        HELP_REQUESTS: 'hersafe_help_requests',
        CHATS: 'hersafe_chats',
        SOS_ALERTS: 'hersafe_sos_alerts'
    };

    const loadData = (key, def = []) => JSON.parse(localStorage.getItem(key)) || def;
    const saveData = (key, data) => localStorage.setItem(key, JSON.stringify(data));

    // Initialize Mock Data
    if (!localStorage.getItem(STORAGE_KEYS.USERS)) {
        saveData(STORAGE_KEYS.USERS, [
            { id: 'g1', phone: '1', name: 'Priya Sharma', city: 'Jaipur', role: 'guardian', verificationBadge: 'Trusted', ratingAvg: 4.8, helpsCompleted: 12, isAvailable: true, joinDate: new Date().toISOString() },
            { id: 't1', phone: '2', name: 'Riya Singh', city: 'Jaipur', role: 'traveler', joinDate: new Date().toISOString() }
        ]);
    }

    // ---------- Auth Context ----------
    const AuthContext = createContext();
    function AuthProvider({ children }) {
        const [user, setUser] = useState(JSON.parse(localStorage.getItem('hersafe_session')));
        
        const login = (phone) => {
            const users = loadData(STORAGE_KEYS.USERS);
            let found = users.find(u => u.phone === phone) || { id: 'u_'+Date.now(), phone, name: '', city: '', role: 'traveler' };
            if (!users.find(u => u.phone === phone)) { users.push(found); saveData(STORAGE_KEYS.USERS, users); }
            localStorage.setItem('hersafe_session', JSON.stringify(found));
            setUser(found);
            return found;
        };

        const logout = () => { localStorage.removeItem('hersafe_session'); setUser(null); };

        const updateProfile = (data) => {
            const users = loadData(STORAGE_KEYS.USERS);
            const idx = users.findIndex(u => u.id === user.id);
            const updated = { ...user, ...data };
            users[idx] = updated;
            saveData(STORAGE_KEYS.USERS, users);
            localStorage.setItem('hersafe_session', JSON.stringify(updated));
            setUser(updated);
        };

        return <AuthContext.Provider value={{ user, login, logout, updateProfile }}>{children}</AuthContext.Provider>;
    }
    const useAuth = () => useContext(AuthContext);

    // ---------- Components ----------
    function PhoneAuth() {
        const [phone, setPhone] = useState('');
        const { login } = useAuth();
        const nav = useNavigate();
        return (
            <div className="min-h-screen flex items-center justify-center p-4 bg-purple-50">
                <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center">
                    <h2 className="text-3xl font-bold text-purple-700">HerSafe Network</h2>
                    <input type="tel" placeholder="Enter '1' for Guardian, '2' for Traveler" value={phone} onChange={e=>setPhone(e.target.value)} className="w-full p-3 border rounded-xl mt-6" />
                    <button onClick={() => { login(phone); nav('/'); }} className="w-full bg-purple-600 text-white p-3 rounded-xl mt-4 font-bold">Login</button>
                </div>
            </div>
        );
    }

    function ProfileSetup() {
        const { user, updateProfile } = useAuth();
        const [form, setForm] = useState({ name: '', city: '', role: 'traveler' });
        const nav = useNavigate();
        return (
            <div className="min-h-screen p-4 flex items-center justify-center bg-gray-50">
                <div className="bg-white p-6 rounded-2xl shadow-lg w-full max-w-md">
                    <h2 className="text-2xl font-bold text-purple-700 mb-4">Setup Profile</h2>
                    <input placeholder="Full Name" className="w-full border p-2 rounded mb-3" onChange={e=>setForm({...form, name: e.target.value})} />
                    <input placeholder="City" className="w-full border p-2 rounded mb-3" onChange={e=>setForm({...form, city: e.target.value})} />
                    <select className="w-full border p-2 rounded mb-4" onChange={e=>setForm({...form, role: e.target.value})}>
                        <option value="traveler">Traveler</option>
                        <option value="guardian">Guardian</option>
                    </select>
                    <button onClick={() => { updateProfile(form); nav('/'); }} className="w-full bg-purple-600 text-white p-3 rounded-xl font-bold">Save</button>
                </div>
            </div>
        );
    }

    function TravelerDashboard() {
        const { user, logout } = useAuth();
        const guardians = loadData(STORAGE_KEYS.USERS).filter(u => u.role === 'guardian' && u.city === user.city);
        return (
            <div className="p-6 max-w-2xl mx-auto">
                <div className="flex justify-between items-center mb-6">
                    <h1 className="text-2xl font-bold text-purple-700">Hi, {user.name} ✈️</h1>
                    <button onClick={logout} className="text-red-500">Logout</button>
                </div>
                <div className="bg-white p-4 rounded-xl shadow mb-6">
                    <h2 className="font-bold mb-4">🛡️ Trusted Guardians in {user.city}</h2>
                    {guardians.map(g => (
                        <div key={g.id} className="flex justify-between items-center border-b py-3 last:border-0">
                            <div>
                                <p className="font-bold">{g.name}</p>
                                <p className="text-xs text-purple-600 font-semibold">{g.verificationBadge}</p>
                            </div>
                            <Link to={`/chat/${g.id}?role=traveler&otherName=${g.name}`} className="bg-purple-100 text-purple-700 px-4 py-1 rounded-full text-sm">Help</Link>
                        </div>
                    ))}
                </div>
                <div className="map-placeholder">Interactive Map (Demo)</div>
                <button className="sos-btn fixed bottom-8 right-8 bg-red-600 text-white w-16 h-16 rounded-full font-bold shadow-lg">SOS</button>
            </div>
        );
    }

    function GuardianDashboard() {
        const { user, logout } = useAuth();
        return (
            <div className="p-6 max-w-2xl mx-auto">
                <div className="flex justify-between items-center mb-4">
                    <h1 className="text-2xl font-bold text-green-700">Guardian Panel</h1>
                    <button onClick={logout} className="text-red-500">Logout</button>
                </div>
                <div className="bg-green-50 p-6 rounded-xl border border-green-200 text-center">
                    <p className="text-green-800 font-bold">You are currently Active</p>
                    <p className="text-sm text-green-600">Waiting for nearby travelers...</p>
                </div>
            </div>
        );
    }

    function ChatPage() {
        const { user } = useAuth();
        const { chatId } = useParams();
        const name = new URLSearchParams(useLocation().search).get('otherName');
        return (
            <div className="h-screen flex flex-col">
                <div className="bg-purple-700 p-4 text-white flex justify-between">
                    <span className="font-bold">Chat with {name}</span>
                    <Link to="/" className="text-sm underline">Back</Link>
                </div>
                <div className="flex-1 p-4 bg-gray-50 overflow-y-auto">
                    <div className="bg-white p-3 rounded-lg shadow-sm max-w-xs">Hello! I'm here to help. Where are you?</div>
                </div>
                <div className="p-4 border-t flex gap-2 bg-white">
                    <input className="flex-1 border rounded-full px-4" placeholder="Type..." />
                    <button className="bg-purple-600 text-white px-6 py-2 rounded-full">Send</button>
                </div>
            </div>
        );
    }

    function App() {
        const { user } = useAuth();
        if (!user) return <PhoneAuth />;
        if (!user.name) return <ProfileSetup />;
        return (
            <Routes>
                <Route path="/chat/:chatId" element={<ChatPage />} />
                <Route path="/" element={user.role === 'traveler' ? <TravelerDashboard /> : <GuardianDashboard />} />
            </Routes>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
        <HashRouter>
            <AuthProvider>
                <App />
            </AuthProvider>
        </HashRouter>
    );
</script>
</body>
</html>
