<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerSafe | Guardian Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="app-container">
        <section id="login-page" class="page active">
            <div class="card">
                <h1 class="brand">HerSafe</h1>
                <p class="subtitle">Guardian Login</p>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+91 00000 00000">
                </div>
                <button onclick="requestOTP()" class="btn-primary">Get OTP</button>
                <div id="otp-section" class="hidden">
                    <input type="text" id="otp" placeholder="Enter 6-digit OTP">
                    <button onclick="verifyLogin()" class="btn-primary">Verify & Enter</button>
                </div>
            </div>
        </section>

        <section id="verify-page" class="page">
            <div class="card">
                <h2>Trust Verification</h2>
                <p class="info-text">Complete these steps to become a <b>Trusted Guardian</b>.</p>
                
                <div class="verify-item">
                    <span>Step 1: Identity Check</span>
                    <input type="file" id="selfie" accept="image/*" class="file-input">
                    <label for="selfie" class="btn-outline">Upload Selfie</label>
                </div>

                <div class="verify-item">
                    <span>Step 2: Social Link (Optional)</span>
                    <input type="url" id="social-link" placeholder="LinkedIn or Instagram URL">
                </div>

                <button onclick="submitVerification()" class="btn-success">Submit for Verification</button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
